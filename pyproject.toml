[tool.poetry]
name = "last-shout"
version = "0.8.0"
description = "Post Last.fm statistics to Mastodon"
authors = ["Brian Pepple <bdpepple@gmail.com>"]
license = "GPL-3.0-or-later"
maintainers = ["Brian Pepple <bdpepple@gmail.com>"]
readme = "README.rst"
packages = [
	{ include = "last_shout" },
]
include = [
    { path = "tests", format = "sdist" }
]
classifiers=[
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
    "Natural Language :: English",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Topic :: Utilities",
    "Topic :: Other/Nonlisted Topic",
    "Operating System :: MacOS :: MacOS X",
    "Operating System :: POSIX",
    "Operating System :: POSIX :: BSD",
    "Operating System :: POSIX :: Linux",
    "Operating System :: Microsoft :: Windows",
]
keywords=["lastfm", "twitter", "python", "music", "mastodon"]

[tool.poetry.dependencies]
python = "^3.9"
pylast = "^4.2.1"
"Mastodon.py" = "^1.5.1"

[tool.poetry.group.dev.dependencies]
pytest-cov = "^2.12.1"
black = "^23.0"
tox = "^3.24.3"
pre-commit = "^2.15.0"
seed-isort-config = "^2.2.0"
ruff = "^0.0.280"

[tool.poetry.scripts]
last-shout = "last_shout.main:main"

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.urls]
"Homepage" = "https://github.com/bpepple/last-shout"
"Bug Tracker" = "https://github.com/bpepple/last-shout/issues"

[tool.black]
line-length = 95
target-version = ["py39"] 

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 95
default_section = "THIRDPARTY"
known_first_party = []
known_third_party = ["mastodon", "pylast"]

[tool.ruff]
fix = true
line-length = 95
show-fixes = true
target-version = "py39"
ignore = ["T201"]
select = [
  "A",
  "ANN",
  "ARG",
  "B",
  "BLE",
  "C40",
  "COM",
  "CPY",
  "DJ",
  "DTZ",
  "E",
  "ERA",
  "F",
  "G",
  "I",
  "ICN",
  "INP",
  "ISC",
  "N",
  "NPY",
  "PD",
  "PGH",
  "PIE",
  "PLC",
  "PLE",
  "PLW",
  "PT",
  "PTH",
  "PYI",
  "Q",
  "RET",
  "RSE",
  "RUF",
  "S",
  "SIM",
  "SLF",
  "T10",
  "T20",
  "TCH",
  "TID",
  "UP",
  "W",
  "YTT"
]

[tool.ruff.flake8-annotations]
allow-star-arg-any = true

[tool.ruff.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.isort]
combine-as-imports = true

[tool.ruff.per-file-ignores]
"tests/test_*.py" = ["S101", "S105","S320"]

[tool.coverage.run]
source = ["last_shout"]

[tool.coverage.report]
show_missing = true
